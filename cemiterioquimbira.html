<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">

<title>Afro-Roteiros</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* (SEU CSS ORIGINAL — NÃO ALTEREI NADA) */
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Inter', sans-serif; background: #ffffff; color: #1a1a1a; line-height: 1.7; padding-top: 70px; }

/* ... TODO O SEU CSS CONTINUA IGUAL ... */
</style>
</head>

<body>

<div class="top-bar">
    <a href="/"><i class="fas fa-home"></i> <span>Home</span></a>
    <span class="divisor">|</span>
    <a href="https://instagram.com/afroroteiros" target="_blank"><i class="fab fa-instagram"></i> <span>Instagram</span></a>
    <a href="https://facebook.com/afroroteiros" target="_blank"><i class="fab fa-facebook"></i> <span>Facebook</span></a>
    <a href="https://youtube.com/@afroroteiros" target="_blank"><i class="fab fa-youtube"></i> <span>YouTube</span></a>
</div>

<div class="header">
    <img src="logo.png" class="logo">
    <div class="cidade-titulo">
        Campos dos Goytacazes
        <small>Rio de Janeiro</small>
    </div>
</div>

<div class="main-container">

    <div class="ponto-titulo">
        <h2 id="titulo"></h2>
    </div>

    <div class="content-wrapper">

        <div class="carousel-wrapper">
            <div class="carousel-section">
                <div class="carousel-container" id="carouselClick">
                    <div class="carousel">
                        <img src="canal1.jpg" class="slide active">
                        <img src="canal2.png" class="slide">
                        <img src="canal3.jpg" class="slide">
                    </div>
                    <div class="click-hint">
                        <span>Clique para ampliar</span>
                    </div>
                </div>
            </div>

            <div class="carousel-controls">
                <div class="indicators">
                    <span class="indicator active" data-index="0"></span>
                    <span class="indicator" data-index="1"></span>
                    <span class="indicator" data-index="2"></span>
                </div>
            </div>
        </div>

        <div class="text-wrapper">
            <div class="text-section" id="conteudo"></div>
        </div>

    </div>
</div>

<div class="sources-footer">
    <span>Imagens: Acervo Afro-Roteiros</span>
    <span>Conteúdo: Pesquisa histórica</span>
    <span>Atualizado em: março de 2026</span>
</div>

<div class="footer">
    Afro-Roteiros • Campos dos Goytacazes • RJ
</div>

<div class="lightbox" id="lightbox">
    <span id="lightboxClose">&times;</span>
    <img id="lightboxImage">
</div>

<script>
// ================= CARROSSEL =================
let currentSlide = 0;
const slides = document.querySelectorAll('.slide');
const indicators = document.querySelectorAll('.indicator');

function showSlide(index) {
    slides.forEach(s => s.classList.remove('active'));
    indicators.forEach(i => i.classList.remove('active'));
    slides[index].classList.add('active');
    indicators[index].classList.add('active');
    currentSlide = index;
}

function nextSlide() {
    showSlide((currentSlide + 1) % slides.length);
}

let slideInterval = setInterval(nextSlide, 6000);

indicators.forEach((indicator, index) => {
    indicator.addEventListener('click', () => {
        showSlide(index);
    });
});

// ================= GOOGLE SHEETS =================

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// ⚠️ CONFIRA O NOME DA ABA
const url = "https://opensheet.elk.sh/1T_vZXdnjpR-Pup8i0D4-K25g5WcoHx_8OojDeGixF90/Roteiro1";

fetch(url)
  .then(res => res.json())
  .then(data => {
    console.log(data);

    const pagina = data.find(item => item.id === id);

    if (pagina) {
      document.getElementById("titulo").innerText = pagina.titulo;
      document.getElementById("conteudo").innerHTML = pagina.conteudo;
    } else {
      document.getElementById("conteudo").innerHTML = "<p>Conteúdo não encontrado.</p>";
    }
  })
  .catch(err => {
    console.error(err);
    document.getElementById("conteudo").innerHTML = "<p>Erro ao carregar conteúdo.</p>";
  });

</script>

</body>
</html>

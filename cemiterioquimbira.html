<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Afro-Roteiros</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    padding-top: 70px;
}

.top-bar {
    position: fixed;
    top: 0;
    width: 100%;
    background: #fff;
    padding: 10px 20px;
    display: flex;
    justify-content: flex-end;
    gap: 15px;
    border-bottom: 1px solid #eee;
}

.header {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 20px;
}

.logo {
    max-width: 120px;
}

.main-container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

h2 {
    font-family: 'Merriweather', serif;
    border-bottom: 2px solid #790016;
    padding-bottom: 10px;
}

.content-wrapper {
    display: flex;
    gap: 30px;
}

.carousel img {
    width: 100%;
    border-radius: 10px;
}

.text-wrapper {
    max-height: 70vh;
    overflow-y: auto;
}

.destaque {
    border-left: 4px solid #790016;
    padding: 15px;
    background: #fafafa;
    margin: 20px 0;
}

@media(max-width:768px){
    .content-wrapper {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="top-bar">
    <a href="/">Home</a>
</div>

<div class="header">
    <img src="logo.png" class="logo">
    <div>
        Campos dos Goytacazes<br>
        <small>Rio de Janeiro</small>
    </div>
</div>

<div class="main-container">

    <h2 id="titulo"></h2>

    <div class="content-wrapper">

        <div class="carousel">
            <img src="canal1.jpg">
        </div>

        <div class="text-wrapper">
            <div id="conteudo"></div>
        </div>

    </div>

</div>

<script>
// pega o ID da URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// LINK DA SUA PLANILHA
const url = "https://opensheet.elk.sh/1T_vZXdnjpR-Pup8i0D4-K25g5WcoHx_8OojDeGixF90/Roteiro1";

fetch(url)
  .then(res => res.json())
  .then(data => {
    const pagina = data.find(item => item.id === id);

    if (pagina) {
      document.getElementById("titulo").innerText = pagina.titulo;
      document.getElementById("conteudo").innerHTML = pagina.conteudo;
    } else {
      document.getElementById("conteudo").innerHTML = "<p>Conteúdo não encontrado.</p>";
    }
  })
  .catch(err => {
    console.error(err);
    document.getElementById("conteudo").innerHTML = "<p>Erro ao carregar.</p>";
  });
</script>

</body>
</html>

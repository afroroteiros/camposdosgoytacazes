<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">

<title>Afro-Roteiros | Campos dos Goytacazes</title>

<!-- Fonte Inter e Merriweather -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    line-height: 1.7;
    padding-top: 70px;
}

/* HEADER SUPERIOR FIXO */
.top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    padding: 12px 20px;
    z-index: 100;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 20px;
    font-size: 14px;
}

.top-bar a {
    color: #3D441E;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
    font-weight: 500;
}

.top-bar a:hover {
    color: #790016;
    transform: translateY(-1px);
}

.top-bar i {
    font-size: 16px;
}

.top-bar .divisor {
    color: #ddd;
    font-size: 18px;
}

/* HEADER PRINCIPAL */
.header {
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    padding: 20px 20px 10px;
    background: transparent;
    max-width: 1200px;
    margin: 0 auto;
    gap: 15px;
}

.logo {
    width: auto;
    height: auto;
    max-width: 140px;
    max-height: 70px;
    object-fit: contain;
    flex-shrink: 0;
}

.cidade-titulo {
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    font-weight: 600;
    color: #3D441E;
    margin: 0;
    line-height: 1.2;
    flex-shrink: 1;
}

.cidade-titulo small {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: #790016;
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.3;
}

/* CONTAINER PRINCIPAL */
.main-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
}

/* TÍTULO DO PONTO HISTÓRICO */
.ponto-titulo {
    margin: 20px 0 20px 0;
}

.ponto-titulo h2 {
    font-family: 'Merriweather', serif;
    font-size: 32px;
    font-weight: 700;
    margin: 0 0 5px 0;
    line-height: 1.3;
    color: #1a1a1a;
    border-bottom: 2px solid #790016;
    padding-bottom: 8px;
    display: inline-block;
}

/* LAYOUT DESKTOP: DUAS COLUNAS */
.content-wrapper {
    display: flex;
    flex-direction: row;
    gap: 30px;
    margin: 20px 0 40px 0;
    align-items: flex-start;
}

.carousel-wrapper {
    flex: 1.2;
    min-width: 0;
}

/* CARROSSEL */
.carousel-section {
    display: flex;
    justify-content: center;
    margin: 0;
}

.carousel-container {
    width: 100%;
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 30px 40px -15px rgba(0, 0, 0, 0.3);
    cursor: pointer;
    transition: transform 0.3s ease;
}

.carousel-container:hover {
    transform: scale(1.02);
}

.carousel {
    position: relative;
    width: 100%;
    height: 0;
    padding-bottom: 56.25%;
    background: #f0f0f0;
}

.slide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1.2s ease-in-out;
    pointer-events: none;
}

.slide.active {
    opacity: 1;
}

.click-hint {
    position: absolute;
    bottom: 15px;
    right: 15px;
    background: rgba(0, 0, 0, 0.6);
    color: white;
    padding: 8px 12px;
    border-radius: 30px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 10;
    backdrop-filter: blur(5px);
    pointer-events: none;
}

.click-hint svg {
    width: 16px;
    height: 16px;
    fill: white;
}

.carousel-controls {
    display: flex;
    justify-content: center;
    margin-top: 16px;
}

.indicators {
    display: flex;
    gap: 10px;
}

.indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ccc;
    transition: all 0.3s ease;
    cursor: pointer;
}

.indicator.active {
    background: #790016;
    width: 30px;
    border-radius: 15px;
}

/* TEXTO */
.text-wrapper {
    flex: 0.9;
    min-width: 280px;
    max-height: 70vh;
    overflow-y: auto;
    padding-right: 10px;
    scrollbar-width: thin;
    scrollbar-color: #790016 #f0f0f0;
}

.text-wrapper::-webkit-scrollbar {
    width: 6px;
}

.text-wrapper::-webkit-scrollbar-track {
    background: #f0f0f0;
    border-radius: 10px;
}

.text-wrapper::-webkit-scrollbar-thumb {
    background: #790016;
    border-radius: 10px;
}

.text-section {
    margin: 0;
}

p {
    font-size: 17px;
    margin-bottom: 20px;
    text-align: justify;
    text-justify: inter-word;
    hyphens: auto;
}

.destaque {
    border-left: 4px solid #790016;
    margin: 30px 0;
    font-weight: 500;
    font-size: 18px;
    background: #fafafa;
    padding: 20px 24px;
    border-radius: 0 16px 16px 0;
    text-align: justify;
    color: #2a2a2a;
    line-height: 1.8;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
}

/* RODAPÉ DE FONTES */
.sources-footer {
    max-width: 1200px;
    margin: 20px auto 40px;
    padding: 15px 20px;
    border-top: 1px solid #eee;
    font-size: 11px;
    color: #999;
    text-align: center;
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.sources-footer span {
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 28px 20px;
    background: #111;
    color: white;
    font-size: 14px;
    letter-spacing: 0.5px;
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(10px);
}

.lightbox.active {
    display: flex;
}

.lightbox-content {
    position: relative;
    width: 90%;
    height: 90%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.lightbox-image {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 8px;
}

.lightbox-close {
    position: absolute;
    top: 20px;
    right: 30px;
    color: white;
    font-size: 40px;
    cursor: pointer;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    transition: all 0.3s;
}

.lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: white;
    font-size: 50px;
    cursor: pointer;
    padding: 20px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
}

.lightbox-nav.prev {
    left: 20px;
}

.lightbox-nav.next {
    right: 20px;
}

.lightbox-counter {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    background: rgba(0, 0, 0, 0.5);
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 14px;
}

/* LOADING */
.loading {
    text-align: center;
    padding: 50px;
    color: #790016;
    font-size: 18px;
}

.loading i {
    font-size: 30px;
    margin-bottom: 10px;
    display: block;
}

/* ========== MOBILE ========== */
@media (max-width: 768px) {
    body {
        padding-top: 60px;
    }
    
    .top-bar {
        padding: 8px 15px;
        font-size: 12px;
        gap: 12px;
    }
    
    .header {
        padding: 12px 15px 8px;
        gap: 10px;
    }
    
    .logo {
        max-width: 85px;
        max-height: 55px;
    }
    
    .cidade-titulo {
        font-size: 18px;
    }
    
    .cidade-titulo small {
        font-size: 11px;
    }
    
    .ponto-titulo h2 {
        font-size: 24px;
    }
    
    .content-wrapper {
        flex-direction: column;
        gap: 0;
        margin: 0 0 30px 0;
    }
    
    .carousel-wrapper {
        width: 100%;
        margin: 0;
        padding: 0;
    }
    
    .carousel-container {
        width: 100%;
        border-radius: 0;
    }
    
    .carousel {
        padding-bottom: 66.67%;
    }
    
    .text-wrapper {
        width: 100%;
        max-height: none;
        overflow-y: visible;
        padding-right: 0;
    }
    
    p {
        font-size: 16px;
    }
    
    .destaque {
        font-size: 16px;
        padding: 16px 20px;
    }
}

@media (max-width: 480px) {
    .logo {
        max-width: 75px;
        max-height: 50px;
    }
    
    .cidade-titulo {
        font-size: 16px;
    }
    
    .carousel {
        padding-bottom: 75%;
    }
}
</style>

</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
    <a href="/" class="home-link"><i class="fas fa-home"></i> <span>Home</span></a>
    <span class="divisor">|</span>
    <a href="https://instagram.com/afroroteiros" target="_blank"><i class="fab fa-instagram"></i> <span>Instagram</span></a>
    <a href="https://facebook.com/afroroteiros" target="_blank"><i class="fab fa-facebook"></i> <span>Facebook</span></a>
    <a href="https://youtube.com/@afroroteiros" target="_blank"><i class="fab fa-youtube"></i> <span>YouTube</span></a>
</div>

<!-- HEADER -->
<div class="header">
    <img src="logo.png" alt="Afro-Roteiros" class="logo">
    <div class="cidade-titulo">
        Campos dos Goytacazes
        <small>Rio de Janeiro</small>
    </div>
</div>

<div class="main-container">
    
    <!-- TÍTULO DO PONTO -->
    <div class="ponto-titulo">
        <h2 id="pontoTitulo">Carregando...</h2>
    </div>
    
    <div class="content-wrapper">
        
        <!-- CARROSSEL -->
        <div class="carousel-wrapper">
            <div class="carousel-section">
                <div class="carousel-container" id="carouselClick">
                    <div class="carousel" id="carouselSlides">
                        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Carregando imagens...</div>
                    </div>
                    <div class="click-hint">
                        <svg viewBox="0 0 24 24">
                            <path d="M21 11H6.83l3.58-3.59L9 6l-6 6 6 6 1.41-1.41L6.83 13H21v-2z"/>
                        </svg>
                        <span>Clique para ampliar</span>
                    </div>
                </div>
            </div>
            <div class="carousel-controls">
                <div class="indicators" id="indicators">
                    <!-- Indicadores serão inseridos via JavaScript -->
                </div>
            </div>
        </div>
        
        <!-- TEXTO -->
        <div class="text-wrapper">
            <div class="text-section" id="textContent">
                <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Carregando conteúdo...</div>
            </div>
        </div>
        
    </div>
    
</div>

<!-- RODAPÉ DE FONTES -->
<div class="sources-footer" id="sourcesFooter">
    <span><i class="fas fa-spinner fa-pulse"></i> Carregando fontes...</span>
</div>

<div class="footer">
    <span>Afro-Roteiros • Campos dos Goytacazes • RJ</span>
    <br>
    <span style="font-size: 11px; opacity: 0.6;">memória · resistência · identidade</span>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightboxClose">&times;</span>
    <span class="lightbox-nav prev" id="lightboxPrev">&#10094;</span>
    <span class="lightbox-nav next" id="lightboxNext">&#10095;</span>
    <div class="lightbox-content">
        <img class="lightbox-image" id="lightboxImage" src="">
    </div>
    <div class="lightbox-counter" id="lightboxCounter"></div>
</div>

<script>
// CONFIGURAÇÃO - SUBSTITUA PELO ID DA SUA PLANILHA
const SHEET_ID = '1T_vZXdnjpR-Pup8i0D4-K25g5WcoHx_8OojDeGixF90';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

// Estado global
let currentSlide = 0;
let slides = [];
let indicators = [];
let slideInterval;
let conteudoAtual = null;

// Elementos DOM
const carouselContainer = document.getElementById('carouselClick');
const carouselSlides = document.getElementById('carouselSlides');
const indicatorsContainer = document.getElementById('indicators');
const textContent = document.getElementById('textContent');
const pontoTitulo = document.getElementById('pontoTitulo');
const sourcesFooter = document.getElementById('sourcesFooter');
const cidadeNome = document.getElementById('cidadeNome');

// Lightbox elements
const lightbox = document.getElementById('lightbox');
const lightboxImage = document.getElementById('lightboxImage');
const lightboxClose = document.getElementById('lightboxClose');
const lightboxPrev = document.getElementById('lightboxPrev');
const lightboxNext = document.getElementById('lightboxNext');
const lightboxCounter = document.getElementById('lightboxCounter');

// Função para converter o JSON do Google Sheets
function parseGoogleSheetData(jsonText) {
    // Remove o prefixo do Google Sheets
    const jsonString = jsonText.substring(jsonText.indexOf('{'), jsonText.lastIndexOf('}') + 1);
    const data = JSON.parse(jsonString);
    
    const table = data.table;
    const rows = table.rows;
    const headers = table.cols.map(col => col.label);
    
    return rows.map(row => {
        const obj = {};
        row.c.forEach((cell, idx) => {
            obj[headers[idx]] = cell ? cell.v : '';
        });
        return obj;
    });
}

// Função para buscar dados de uma aba específica
async function fetchSheet(sheetName) {
    const url = `${SHEET_URL}&sheet=${encodeURIComponent(sheetName)}`;
    const response = await fetch(url);
    const text = await response.text();
    return parseGoogleSheetData(text);
}

// Função principal para carregar todos os dados
async function carregarConteudo() {
    try {
        // Definir qual ponto exibir (pode vir da URL ou ser fixo)
        const urlParams = new URLSearchParams(window.location.search);
        const pontoSlug = urlParams.get('ponto') || 'kimbira';
        
        // Buscar dados da planilha
        const [cidadeData, pontosData, fontesData] = await Promise.all([
            fetchSheet('cidade'),
            fetchSheet('pontos'),
            fetchSheet('fontes')
        ]);
        
        // Atualizar nome da cidade
        if (cidadeData.length > 0) {
            cidadeNome.innerHTML = `${cidadeData[0].nome}<small>${cidadeData[0].estado}</small>`;
        }
        
        // Encontrar o ponto solicitado
        const ponto = pontosData.find(p => p.slug === pontoSlug) || pontosData[0];
        if (!ponto) throw new Error('Ponto não encontrado');
        
        conteudoAtual = ponto;
        
        // Atualizar título
        pontoTitulo.textContent = ponto.titulo;
        
        // Buscar conteúdo específico do ponto
        const sheetConteudo = `conteudo_${pontoSlug.replace(/-/g, '_')}`;
        let conteudo = [];
        try {
            conteudo = await fetchSheet(sheetConteudo);
            conteudo.sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
        } catch (e) {
            console.warn(`Aba ${sheetConteudo} não encontrada`);
            conteudo = [];
        }
        
        // Carregar imagens
        const imagens = ponto.imagens ? ponto.imagens.split(',').map(img => img.trim()) : [];
        carregarImagens(imagens);
        
        // Carregar texto
        carregarTexto(conteudo);
        
        // Carregar fontes
        const fonte = fontesData.find(f => String(f.ponto_id) === String(ponto.id));
        if (fonte) {
            sourcesFooter.innerHTML = `
                <span><i class="fas fa-camera"></i> Imagens: ${fonte.imagens || 'Acervo Afro-Roteiros'}</span>
                <span><i class="fas fa-file-alt"></i> Conteúdo: ${fonte.conteudo || 'Pesquisa histórica'}</span>
                <span><i class="fas fa-calendar-alt"></i> Atualizado em: ${fonte.data_atualizacao || 'março de 2026'}</span>
            `;
        }
        
    } catch (error) {
        console.error('Erro ao carregar conteúdo:', error);
        textContent.innerHTML = '<p style="color: red;">Erro ao carregar conteúdo. Verifique a conexão com a planilha.</p>';
    }
}

// Função para carregar as imagens no carrossel
function carregarImagens(imagens) {
    carouselSlides.innerHTML = '';
    indicatorsContainer.innerHTML = '';
    
    if (imagens.length === 0) {
        carouselSlides.innerHTML = '<div class="loading">Nenhuma imagem disponível</div>';
        return;
    }
    
    imagens.forEach((img, index) => {
        // Criar slide
        const slide = document.createElement('img');
        slide.src = `imagens/${img}`;
        slide.alt = `${conteudoAtual.titulo} ${index + 1}`;
        slide.classList.add('slide');
        if (index === 0) slide.classList.add('active');
        slide.setAttribute('data-index', index);
        carouselSlides.appendChild(slide);
        
        // Criar indicador
        const indicator = document.createElement('span');
        indicator.classList.add('indicator');
        if (index === 0) indicator.classList.add('active');
        indicator.setAttribute('data-index', index);
        indicator.addEventListener('click', (e) => {
            e.stopPropagation();
            showSlide(index);
            resetInterval();
        });
        indicatorsContainer.appendChild(indicator);
    });
    
    // Atualizar referências
    slides = document.querySelectorAll('.slide');
    indicators = document.querySelectorAll('.indicator');
    
    // Iniciar carrossel automático
    if (slideInterval) clearInterval(slideInterval);
    if (slides.length > 1) {
        slideInterval = setInterval(nextSlide, 6000);
    }
}

// Função para carregar o texto
function carregarTexto(conteudo) {
    textContent.innerHTML = '';
    
    if (conteudo.length === 0) {
        textContent.innerHTML = '<p>Conteúdo em breve.</p>';
        return;
    }
    
    conteudo.forEach(item => {
        if (item.tipo === 'paragrafo') {
            const p = document.createElement('p');
            p.textContent = item.texto;
            textContent.appendChild(p);
        } else if (item.tipo === 'destaque') {
            const div = document.createElement('div');
            div.classList.add('destaque');
            div.textContent = item.texto;
            textContent.appendChild(div);
        }
    });
}

// Funções do carrossel
function showSlide(index) {
    if (!slides.length) return;
    slides.forEach(slide => slide.classList.remove('active'));
    indicators.forEach(ind => ind.classList.remove('active'));
    
    slides[index].classList.add('active');
    indicators[index].classList.add('active');
    
    currentSlide = index;
}

function nextSlide() {
    if (!slides.length) return;
    const next = (currentSlide + 1) % slides.length;
    showSlide(next);
}

function resetInterval() {
    if (slideInterval) {
        clearInterval(slideInterval);
        if (slides.length > 1) {
            slideInterval = setInterval(nextSlide, 6000);
        }
    }
}

// Funções do lightbox
function openLightbox(index) {
    if (!slides.length) return;
    currentSlide = index;
    updateLightboxImage();
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
}

function updateLightboxImage() {
    const currentImage = slides[currentSlide];
    lightboxImage.src = currentImage.src;
    lightboxCounter.textContent = `${currentSlide + 1} de ${slides.length}`;
}

function prevImage() {
    currentSlide = (currentSlide - 1 + slides.length) % slides.length;
    updateLightboxImage();
}

function nextImage() {
    currentSlide = (currentSlide + 1) % slides.length;
    updateLightboxImage();
}

// Eventos
carouselContainer.addEventListener('click', () => {
    if (slides.length) openLightbox(currentSlide);
});
lightboxClose.addEventListener('click', closeLightbox);
lightboxPrev.addEventListener('click', prevImage);
lightboxNext.addEventListener('click', nextImage);

document.addEventListener('keydown', (e) => {
    if (lightbox.classList.contains('active')) {
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') prevImage();
        if (e.key === 'ArrowRight') nextImage();
    }
});

lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
});

// Inicializar
carregarConteudo();
</script>

</body>
</html>
